<!DOCTYPE html>
<html>
<head>
  <title>User - Food Booking</title>
  <meta charset="UTF-8">
</head>

<body>

<h2>Food Booking</h2>

<input id="name" placeholder="Enter Name">

<br><br>

<select id="VegBiryani">
  <option value="0">Veg Biryani (0)</option>
  <option value="1">Veg Biryani (1)</option>
  <option value="2">Veg Biryani (2)</option>
</select>

<select id="Dosa">
  <option value="0">Dosa (0)</option>
  <option value="1">Dosa (1)</option>
  <option value="2">Dosa (2)</option>
</select>

<br><br>

<button onclick="placeOrder()">Place Order</button>

<h3 id="result" style="color: green;"></h3>

<script>
async function placeOrder() {
  const name = document.getElementById("name").value;

  const items = [
    { name: "VegBiryani", qty: Number(document.getElementById("VegBiryani").value) },
    { name: "Dosa", qty: Number(document.getElementById("Dosa").value) }
  ].filter(item => item.qty > 0);

  if (!name || items.length === 0) {
    alert("Enter name and select items");
    return;
  }

  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, items })
    });

    const data = await res.json();

    if (data.token) {
      document.getElementById("result").innerText =
        "Order Placed | Token: " + data.token;
    } else {
      document.getElementById("result").innerText =
        "Error: " + data.message;
    }

  } catch (err) {
    document.getElementById("result").innerText = "Server Error";
  }
}
</script>

</body>
</html>
